title: AI Daily Report
description: 每日 AI 新闻日报 - 由 Hermes Agent 自动生成
theme: minima
lang: zh-CN
timezone: Asia/Shanghai

markdown: kramdown
permalink: /:year/:month/:day/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Hermes AI"

minima:
  skin: dark
  date_format: "%Y年%m月%d日"

header_pages:
  - about.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
